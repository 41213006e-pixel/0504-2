<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PICO Health: Cloud & Ghost Adventure</title>
    <style>
        :root { --pico-bg: #e0f7fa; --pico-dark: #333; --pico-hero: #4ea5ff; --pico-door: #ff7bac; --pico-hp: #ff4757; }
        body { font-family: sans-serif; background-color: var(--pico-bg); margin: 0; display: flex; flex-direction: column; align-items: center; height: 100vh; overflow: hidden; touch-action: none; }
        
        #start-screen {
            position: absolute; width: 100%; height: 100%; background: rgba(0,0,0,0.85);
            color: white; display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 100; padding: 20px; box-sizing: border-box; text-align: center;
        }
        .rule-card { background: #444; padding: 20px; border-radius: 15px; border: 2px solid var(--pico-hero); max-width: 500px; margin-bottom: 20px; }
        #start-btn { padding: 15px 40px; font-size: 24px; background: var(--pico-hero); color: white; border: none; border-radius: 10px; cursor: pointer; font-weight: bold; }
        
        #ui-top { display: flex; justify-content: space-between; width: 95%; max-width: 800px; padding: 10px; font-weight: bold; z-index: 10; }
        #question-box { background: var(--pico-dark); color: white; padding: 12px; border-radius: 8px; width: 95%; max-width: 800px; text-align: center; margin-bottom: 5px; box-shadow: 0 4px 0 #000; font-size: 18px; z-index: 10; }
        canvas { background-color: #f0fbff; border: 4px solid var(--pico-dark); width: 95%; height: auto; max-height: 60vh; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
        
        #mobile-controls { display: none; width: 95%; max-width: 800px; justify-content: space-between; margin-top: 15px; }
        .control-btn { width: 70px; height: 70px; background: rgba(0,0,0,0.1); border: 3px solid var(--pico-dark); border-radius: 50%; display: flex; justify-content: center; align-items: center; font-size: 30px; user-select: none; }
        @media (max-width: 850px) { #mobile-controls { display: flex; } }
    </style>
</head>
<body>

<div id="start-screen">
    <div class="rule-card">
        <h2>☁️ 雲端衛教大冒險 👻</h2>
        <ul style="text-align: left; line-height: 1.8;">
            <li>使用 <b>WASD/方向鍵</b> 或 <b>按鈕</b> 控制移動與跳躍。</li>
            <li>找出代表正確答案的黃金幣 🪙。</li>
            <li><b>小心紅色小鬼！</b>它們會慢慢追著你跑。</li>
            <li>被小鬼碰到或掉下雲端都會扣除生命 ❤️。</li>
            <li>開啟傳送門後逃離現場！</li>
        </ul>
    </div>
    <button id="start-btn">進入冒險</button>
</div>

<div id="ui-top">
    <div id="status-hp" style="color:var(--pico-hp)">HP: ❤️❤️❤️</div>
    <div id="status-score">SCORE: 0</div>
</div>
<div id="question-box">☁️ 雲層加載中...</div>
<canvas id="game-canvas" width="800" height="500"></canvas>

<div id="mobile-controls">
    <div style="display:flex; gap:20px;"><div class="control-btn" id="l">⬅️</div><div class="control-btn" id="r">➡️</div></div>
    <div class="control-btn" id="j">⬆️</div>
</div>

<script>
    const canvas = document.getElementById('game-canvas'), ctx = canvas.getContext('2d');
    const quizBank = [
        { q: "成人每日建議飲水量是體重(kg)乘以多少？", options: ["10ml", "20ml", "30-35ml", "100ml"], correct: 2 },
        { q: "下列哪種運動最能增進心肺功能？", options: ["看電視", "慢跑", "睡覺", "滑手機"], correct: 1 },
        { q: "洗手「內外夾弓大立腕」，最後是？", options: ["指甲", "手指", "手心", "手腕"], correct: 3 },
        { q: "預防近視，用眼30分鐘應休息多久？", options: ["1分鐘", "10分鐘", "30分鐘", "不必"], correct: 1 },
        { q: "正確刷牙法「貝氏刷牙法」，刷毛夾角為？", options: ["15度", "45度", "90度", "180度"], correct: 1 }
    ];

    let cur = 0, score = 0, hp = 3, door = false, platforms = [], coins = [], clouds = [], ghosts = [];
    const player = { x: 50, y: 80, vx: 0, vy: 0, size: 30, ground: false };
    const keys = {};

    function init() {
        door = false; 
        platforms = [{x:0,y:120,w:300,h:15},{x:100,y:270,w:600,h:15},{x:0,y:420,w:800,h:15}];
        coins = []; ghosts = [];
        
        // 隨機生成背景雲朵
        clouds = [];
        for(let i=0; i<8; i++) clouds.push({x: Math.random()*800, y: Math.random()*400, s: 0.2 + Math.random()*0.5});

        // 隨機生成追蹤小怪物
        for(let i=0; i<2; i++) {
            ghosts.push({ x: 400+Math.random()*300, y: 200+Math.random()*200, speed: 0.8 + (Math.random()*0.5) });
        }

        quizBank[cur].options.forEach((text, i) => {
            let p = platforms[Math.floor(Math.random()*3)];
            coins.push({x:p.x+40+Math.random()*(p.w-120),y:p.y-40,text,correct:i===quizBank[cur].correct});
        });
        player.x=50; player.y=80; player.vx=0; player.vy=0;
        document.getElementById('question-box').innerText = quizBank[cur].q;
        document.getElementById('question-box').style.background = "#333";
        document.getElementById('status-hp').innerText = "HP: "+"❤️".repeat(hp);
    }

    document.getElementById('start-btn').onclick = () => {
        document.getElementById('start-screen').style.display = 'none';
        init(); loop();
    };

    const handleInput = (id, k, val) => {
        const el = document.getElementById(id);
        el.addEventListener('touchstart', e=>{e.preventDefault(); keys[k]=val;});
        el.addEventListener('touchend', e=>{e.preventDefault(); keys[k]=false;});
    };
    handleInput('l','ArrowLeft',true); handleInput('r','ArrowRight',true); handleInput('j','ArrowUp',true);
    window.addEventListener('keydown', e=>keys[e.code]=true);
    window.addEventListener('keyup', e=>keys[e.code]=false);

    function update() {
        player.vx = keys['ArrowLeft'] || keys['KeyA'] ? -5.5 : (keys['ArrowRight'] || keys['KeyD'] ? 5.5 : player.vx * 0.85);
        if((keys['ArrowUp'] || keys['KeyW'] || keys['Space']) && player.ground){ player.vy = -12.5; player.ground = false; }
        player.vy += 0.65; player.x += player.vx; player.y += player.vy; player.ground = false;
        
        // 平台碰撞
        platforms.forEach(p => { 
            if(player.x+30>p.x && player.x<p.x+p.w && player.y+30>p.y && player.y+30<p.y+25 && player.vy>=0){ 
                player.y=p.y-30; player.vy=0; player.ground=true; 
            }
        });

        // 怪物追蹤邏輯
        ghosts.forEach(g => {
            let dx = player.x - g.x;
            let dy = player.y - g.y;
            let dist = Math.sqrt(dx*dx + dy*dy);
            g.x += (dx/dist) * g.speed;
            g.y += (dy/dist) * g.speed;
            
            // 怪物碰撞檢查
            if(dist < 25) { die(); }
        });

        // 雲朵緩慢漂移
        clouds.forEach(c => { c.x += c.s; if(c.x > 850) c.x = -100; });

        coins.forEach(c => { 
            if(!c.hide && Math.abs(player.x-c.x)<35 && Math.abs(player.y-c.y)<45){ 
                c.hide=true; 
                if(c.correct){ 
                    door=true; score+=100; 
                    document.getElementById('question-box').innerText="答對了！快逃向傳送門"; 
                    document.getElementById('question-box').style.background="#2ecc71"; 
                } else { 
                    score=Math.max(0,score-20); die(); 
                }
            }
        });

        if(player.y>520) die();
        if(door && player.x>700 && player.y>350){ 
            cur++; 
            if(cur<quizBank.length) init(); 
            else { alert("雲端英雄！總分:"+score); location.reload(); }
        }
        document.getElementById('status-score').innerText = "SCORE: " + score;
    }

    function die() { 
        hp--; 
        if(hp<=0){ alert("遊戲結束！分數:"+score); location.reload(); } 
        else { init(); }
    }

    function draw() {
        ctx.clearRect(0,0,800,500);

        // 畫雲朵
        ctx.fillStyle = "rgba(255, 255, 255, 0.8)";
        clouds.forEach(c => {
            ctx.beginPath();
            ctx.arc(c.x, c.y, 20, 0, Math.PI*2);
            ctx.arc(c.x+20, c.y-10, 25, 0, Math.PI*2);
            ctx.arc(c.x+40, c.y, 20, 0, Math.PI*2);
            ctx.fill();
        });

        // 畫平台
        ctx.fillStyle="#333"; platforms.forEach(p=>ctx.fillRect(p.x,p.y,p.w,p.h));

        // 畫怪物 (紅色鬼魂)
        ghosts.forEach(g => {
            ctx.fillStyle = "#ff4757";
            ctx.beginPath();
            ctx.arc(g.x+15, g.y+15, 15, Math.PI, 0);
            ctx.lineTo(g.x+30, g.y+30);
            ctx.lineTo(g.x, g.y+30);
            ctx.fill();
            // 怪物眼睛
            ctx.fillStyle = "white";
            ctx.fillRect(g.x+6, g.y+10, 4, 4); ctx.fillRect(g.x+20, g.y+10, 4, 4);
        });

        // 畫金幣
        coins.forEach(c=>{
            if(!c.hide){
                ctx.fillStyle="#f1c40f"; ctx.beginPath(); ctx.arc(c.x+15,c.y+15,12,0,7); ctx.fill();
                ctx.fillStyle="#333"; ctx.font="bold 14px sans-serif"; ctx.textAlign="center"; ctx.fillText(c.text,c.x+15,c.y-10);
            }
        });

        // 畫門
        ctx.fillStyle=door?"#ff7bac":"#ccc"; ctx.fillRect(720,350,40,70);
        
        // 畫玩家
        ctx.fillStyle="#4ea5ff"; ctx.fillRect(player.x,player.y,30,30); ctx.strokeRect(player.x,player.y,30,30);
        ctx.fillStyle="black"; ctx.fillRect(player.x+6,player.y+8,4,4); ctx.fillRect(player.x+20,player.y+8,4,4);
    }
    function loop() { update(); draw(); requestAnimationFrame(loop); }
</script>
</body>
</html>
